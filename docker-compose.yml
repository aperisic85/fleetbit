services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: fleetbit_db
    environment:
      POSTGRES_USER: fleetbit
      POSTGRES_PASSWORD: fleetbit
      POSTGRES_DB: fleetbit
    ports:
      - "5432:5432"
    volumes:
      - fleetbit_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetbit"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fleetbit_net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fleetbit_api
    environment:
      DATABASE_URL: postgres://fleetbit:fleetbit@db:5432/fleetbit
      BIND_ADDR: 0.0.0.0:3000
      RUST_LOG: info
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fleetbit_net

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: fleetbit_migrate
    environment:
      DATABASE_URL: postgres://fleetbit:fleetbit@db:5432/fleetbit
    volumes:
      - ./migrations:/migrations
    working_dir: /migrations
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fleetbit_net

  ingestor:
    build:
      context: .
      dockerfile: Dockerfile.ingestor
    container_name: fleetbit_ingestor
    environment:
      DATABASE_URL: postgres://fleetbit:fleetbit@db:5432/fleetbit
      RUST_LOG: info
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fleetbit_net

volumes:
  fleetbit_data:

networks:
  fleetbit_net:
    name: fleetbit_net
